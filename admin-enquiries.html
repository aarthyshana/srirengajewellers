<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="admin-auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Enquiries - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-container {
            max-width: 1000px;
            margin: 4rem auto;
            padding: 2rem;
        }
        
        .admin-header {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--gold-primary);
        }

        .enquiries-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            color: #333;
        }

        .enquiries-table th,
        .enquiries-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-subtle);
        }

        .enquiries-table th {
            background-color: rgba(212, 175, 55, 0.1);
            color: var(--gold-primary);
            font-weight: 600;
        }

        .enquiries-table tr:last-child td {
            border-bottom: none;
        }

        .enquiries-table tbody tr:hover {
            background-color: rgba(212, 175, 55, 0.05);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #666;
            background: white;
            border-radius: var(--radius-md);
        }

        .loading-state {
            text-align: center;
            padding: 2rem;
            color: var(--gold-primary);
        }
    </style>
</head>
<body class="bg-pattern">
    <nav class="navbar glass">
        <div class="nav-content">
            <a href="index.html" class="logo serif">
                <i data-lucide="gem"></i> Sri Renga Jewelers
            </a>
            <div class="nav-links">
                <a href="admin.html" class="nav-link">Add Product</a>
                <a href="admin-rates.html" class="nav-link">Update Rates</a>
                <a href="admin-enquiries.html" class="nav-link active">View Enquiries</a>
                <a href="admin-delete.html" class="nav-link">Delete Product</a>
                <a href="index.html" class="nav-link">Back to Store</a>
            </div>
        </div>
    </nav>

    <main class="admin-container glass">
        <h1 class="admin-header serif">Customer Enquiries</h1>
        
        <div id="loading" class="loading-state">
            <p>Loading enquiries...</p>
        </div>

        <div id="tableContainer" style="display: none;">
            <table class="enquiries-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Email</th>
                        <th>Interested Product IDs</th>
                    </tr>
                </thead>
                <tbody id="enquiriesBody">
                    <!-- Data populated via JS -->
                </tbody>
            </table>
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <i data-lucide="inbox" style="width: 48px; height: 48px; margin-bottom: 1rem; color: var(--border-subtle);"></i>
            <h3>No enquiries found.</h3>
            <p>Customer enquiries submitted from the checkout page will appear here.</p>
        </div>
    </main>

    <script src="admin-enquiries.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
