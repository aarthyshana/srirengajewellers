<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Renga Jewellers - Delete Product</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 2rem;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--gold-primary);
        }

        .admin-form .form-group {
            margin-bottom: 1.5rem;
        }

        .admin-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .admin-form input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            background: white;
            color: #333;
            font-family: inherit;
        }

        .admin-form input:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }

        .alert {
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            display: none;
        }

        .alert.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
    </style>
</head>

<body class="bg-pattern">
    <nav class="navbar glass">
        <div class="nav-content">
            <a href="index.html" class="logo serif">
                <i data-lucide="gem"></i> Sri Renga Jewelers
            </a>
            <div class="nav-links">
                <a href="admin.html" class="nav-link">Add Product</a>
                <a href="admin-rates.html" class="nav-link">Update Rates</a>
                <a href="admin-enquiries.html" class="nav-link">View Enquiries</a>
                <a href="admin-delete.html" class="nav-link active">Delete Product</a>
                <a href="index.html" class="nav-link">Back to Store</a>
            </div>
        </div>
    </nav>

    <main class="admin-container glass">
        <h1 class="admin-header serif">Admin Panel - Delete Product</h1>

        <div id="messageBox" class="alert"></div>

        <form id="adminDeleteForm" class="admin-form">
            <div class="form-group">
                <label for="productId">Product ID *</label>
                <input type="text" id="productId" name="productId" required
                    placeholder="Enter Product ID to delete">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem; background-color: #dc3545; border-color: #dc3545;">
                Delete Product
            </button>
        </form>
    </main>

    <script src="admin-delete.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
