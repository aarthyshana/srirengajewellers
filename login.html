<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Sri Renga Jewellers</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="chit-styles.css">
</head>

<body class="bg-dark-jewel login-page">
    <div class="glass-container login-card fade-in">
        <div class="logo-container">
            <h1 class="brand-title">Sri Renga<span>Jewellers</span></h1>
            <p class="brand-subtitle">Exclusive Chit Plan Portal</p>
        </div>

        <form id="loginForm" class="login-form">
            <div class="input-group">
                <label for="userId">Email ID or Phone Number</label>
                <div class="input-wrapper">
                    <input type="text" id="userId" name="userId" placeholder="Enter your email or phone" required
                        autocomplete="off">
                    <span class="icon">&#128100;</span>
                </div>
                <small class="hint">This identifier will be unique to your account</small>
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <div class="input-wrapper">
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    <span class="icon eye-toggle" id="togglePassword">&#128065;</span>
                </div>

                <div class="password-requirements" id="passwordReqs">
                    <p class="req-title">Password must contain:</p>
                    <ul>
                        <li id="req-length" class="invalid">At least 8 characters</li>
                        <li id="req-upper" class="invalid">1 Uppercase letter</li>
                        <li id="req-lower" class="invalid">1 Lowercase letter</li>
                        <li id="req-number" class="invalid">1 Number</li>
                        <li id="req-special" class="invalid">1 Special character (@$!%*?&)</li>
                    </ul>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="loginBtn" disabled>
                Sign In
                <span class="arrow">&rarr;</span>
            </button>

            <p class="signup-prompt">New to Sri Renga Jewellers? <a href="create-account.html">Create an account</a></p>
        </form>
    </div>

    <!-- Background decorative elements -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <script src="chit-script.js"></script>
</body>

</html>
