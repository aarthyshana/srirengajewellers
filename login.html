<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Renga Jewellers - Admin Login</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-container {
            max-width: 400px;
            margin: 6rem auto;
            padding: 2rem;
            text-align: center;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--gold-primary);
        }

        .admin-form .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .admin-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .admin-form input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            background: white;
            color: #333;
            font-family: inherit;
        }

        .admin-form input:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }

        .alert {
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            display: none;
            text-align: left;
        }

        .alert.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
    </style>
</head>

<body class="bg-pattern">
    <nav class="navbar glass">
        <div class="nav-content">
            <a href="index.html" class="logo serif">
                <i data-lucide="gem"></i> Sri Renga Jewelers
            </a>
            <div class="nav-links">
                <a href="index.html" class="nav-link">Back to Store</a>
            </div>
        </div>
    </nav>

    <main class="admin-container glass">
        <h1 class="admin-header serif">Admin Login</h1>

        <div id="messageBox" class="alert error" style="display: none;"></div>

        <form id="loginForm" class="admin-form">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required placeholder="Enter username">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter password">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Login
            </button>
        </form>
    </main>

    <script>
        lucide.createIcons();

        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const messageBox = document.getElementById('messageBox');

            // Hardcoded credentials
            if (user === 'admin' && pass === '123pass') {
                sessionStorage.setItem('isAuthenticated', 'true');
                window.location.href = 'admin.html';
            } else {
                messageBox.textContent = 'Invalid username or password.';
                messageBox.style.display = 'block';
            }
        });
    </script>
</body>

</html>
