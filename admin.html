<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <script src="admin-auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Renga Jewellers - Admin Panel</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .admin-container {
            max-width: 800px;
            margin: 4rem auto;
            padding: 2rem;
        }

        .admin-header {
            text-align: center;
            margin-bottom: 2rem;
            color: var(--gold-primary);
        }

        .admin-form .form-group {
            margin-bottom: 1.5rem;
        }

        .admin-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-main);
            font-weight: 500;
        }

        .admin-form input,
        .admin-form select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            background: white;
            color: #333;
            font-family: inherit;
        }

        .admin-form input:focus,
        .admin-form select:focus {
            outline: none;
            border-color: var(--gold-primary);
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.2);
        }

        .image-preview {
            margin-top: 1rem;
            max-width: 200px;
            max-height: 200px;
            border-radius: var(--radius-md);
            display: none;
            object-fit: cover;
        }

        .alert {
            padding: 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1.5rem;
            display: none;
        }

        .alert.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        #subCategoryGroup {
            display: none;
        }
    </style>
</head>

<body class="bg-pattern">
    <nav class="navbar glass">
        <div class="nav-content">
            <a href="index.html" class="logo serif">
                <i data-lucide="gem"></i> Sri Renga Jewellers
            </a>
            <div class="nav-links">
                <a href="admin.html" class="nav-link active">Add Product</a>
                <a href="admin-rates.html" class="nav-link">Update Rates</a>
                <a href="admin-enquiries.html" class="nav-link">View Enquiries</a>
                <a href="admin-delete.html" class="nav-link">Delete Product</a>
                <a href="index.html" class="nav-link">Back to Store</a>
            </div>
        </div>
    </nav>

    <main class="admin-container glass">
        <h1 class="admin-header serif">Admin Panel - Add Jewelry</h1>

        <div id="messageBox" class="alert"></div>

        <form id="adminForm" class="admin-form">
            <div class="form-group">
                <label for="product_id">Product ID *</label>
                <input type="text" id="product_id" name="product_id" required placeholder="e.g. RG-001">
            </div>

            <div class="form-group">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" required
                    placeholder="e.g. Antique 22k Gold Heritage Necklace">
            </div>

            <div class="form-group">
                <label for="category">Main Category *</label>
                <select id="category" name="category" required>
                    <option value="" disabled selected>Select Category</option>
                    <option value="Gold">Gold</option>
                    <option value="Silver">Silver</option>
                </select>
            </div>

            <div class="form-group" id="subCategoryGroup">
                <label for="sub_category">Sub Category (for Silver) *</label>
                <select id="sub_category" name="sub_category">
                    <option value="" disabled selected>Select Sub Category</option>
                    <option value="Silver Rings">Rings</option>
                    <option value="Silver Chains">Chains</option>
                    <option value="Silver Pendants">Pendants</option>
                    <option value="Silver Studs">Studs</option>
                    <option value="Silver Bracelets">Bracelets</option>
                    <option value="Silver Toe Rings">Toe Rings</option>
                </select>
            </div>

            <div class="form-group">
                <label for="weight">Weight *</label>
                <input type="text" id="weight" name="weight" required placeholder="e.g. 45.500g">
            </div>

            <div class="form-group"
                style="display: flex; flex-direction: column; gap: 0.5rem; background: rgba(255,255,255,0.5); padding: 1rem; border-radius: 8px;">
                <label>Product Image *</label>
                <div style="display: flex; flex-direction: column; gap: 0.5rem;">
                    <label for="imageFile" style="font-weight: normal; font-size: 0.9em;">Upload from Computer</label>
                    <input type="file" id="imageFile" name="imageFile" accept="image/*" required>
                </div>
                <img id="imagePreview" class="image-preview" alt="Image preview">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                Add Product to Store
            </button>
        </form>
    </main>

    <script src="admin.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
